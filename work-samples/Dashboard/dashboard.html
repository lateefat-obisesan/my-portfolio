<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="author" content="Lateefat Obisesan">
        <meta name="description" content="My first web page">
        <meta name="keywords" content="html, css, web, web development, javascript,">
        <link rel="icon" href="./assests/media/favicon.png" type="image/x-icon">
        <title>Dashboard</title>
        <link rel="stylesheet" href="./assets/style/style.css" media="all">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    </head>
    <body>
        <div class="container">
            <header class="header">
                <h2 class="logo">Dashboard</h2>
                <nav>
                    <ul>
                        <li><a href="#">Home</a></li>
                        <li><a href="#">Profile</a></li>
                        <li><a href="#">Settings</a></li>
                        <li><a href="#">Logout</a></li>
                    </ul>
                </nav>
                <form>
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Search">
                </form>
            </header>
            <main>
                <table class="table">
                    <thead>
                        <tr>
                            <th></th>
                            <th>DATA TYPE</th>
                            <th>TOTAL</th>
                            <th>LAST 7 DAYS</th>
                            <th>LATEST RECORD</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="icon users">R</td>
                            <td>Registered users</td>
                            <td>138</td>
                            <td>9</td>
                            <td>May 7</td>
                            <td><button>Show more</button></td>
                        </tr>
                        <tr>
                            <td class="icon article">P</td>
                            <td>Published articles</td>
                            <td>79</td>
                            <td>3</td>
                            <td>May 13</td>
                            <td><button>Show more</button></td>
                        </tr>
                        <tr>
                            <td class="icon author">A</td>
                            <td>Authors</td>
                            <td>21</td>
                            <td>1</td>
                            <td>Apr 12</td>
                            <td><button>Show more</button></td>
                        </tr>
                        <tr>
                            <td class="icon message">M</td>
                            <td>Messages</td>
                            <td>12</td>
                            <td>2</td>
                            <td>May 21</td>
                            <td><button>Show more</button></td>
                        </tr>
                        <tr>
                            <td class=" icon visit">V</td>
                            <td>Visits</td>
                            <td>895</td>
                            <td>46</td>
                            <td>May 22</td>
                            <td><button>Show more</button></td>
                        </tr>
                    </tbody>
                </table>
            </main>
        </div>
    </body>
</html>
